version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cpip
      POSTGRES_USER: cpip
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpip"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns,sqs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  portfolio-service:
    build: ./services/portfolio-service
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://cpip:localpassword@postgres:5432/cpip
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      PORTFOLIO_UPDATES_QUEUE_URL: ""
      PORTFOLIO_RECALC_QUEUE_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  trade-service:
    build: ./services/trade-service
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql://cpip:localpassword@postgres:5432/cpip
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      TRADE_EVENTS_TOPIC_ARN: ""
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  market-data-service:
    build: ./services/market-data-service
    ports:
      - "5003:5003"
    environment:
      DATABASE_URL: postgresql://cpip:localpassword@postgres:5432/cpip
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      PRICE_UPDATES_TOPIC_ARN: ""
      MOCK_PRICES_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
