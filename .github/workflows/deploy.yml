name: Test, Build, Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: cpip-dev

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test portfolio-service
        run: |
          pip install -r services/portfolio-service/requirements.txt
          pytest services/portfolio-service/tests/ -v

      - name: Test trade-service
        run: |
          pip install -r services/trade-service/requirements.txt
          pytest services/trade-service/tests/ -v

      - name: Test market-data-service
        run: |
          pip install -r services/market-data-service/requirements.txt
          pytest services/market-data-service/tests/ -v

  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push portfolio-service
        run: |
          docker build -t $ECR_REGISTRY/cpip-portfolio-service:${{ github.sha }} \
            services/portfolio-service
          docker push $ECR_REGISTRY/cpip-portfolio-service:${{ github.sha }}

      - name: Build and push trade-service
        run: |
          docker build -t $ECR_REGISTRY/cpip-trade-service:${{ github.sha }} \
            services/trade-service
          docker push $ECR_REGISTRY/cpip-trade-service:${{ github.sha }}

      - name: Build and push market-data-service
        run: |
          docker build -t $ECR_REGISTRY/cpip-market-data-service:${{ github.sha }} \
            services/market-data-service
          docker push $ECR_REGISTRY/cpip-market-data-service:${{ github.sha }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy portfolio-service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service cpip-dev-portfolio \
            --force-new-deployment

      - name: Deploy trade-service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service cpip-dev-trade \
            --force-new-deployment

      - name: Deploy market-data-service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service cpip-dev-market-data \
            --force-new-deployment
